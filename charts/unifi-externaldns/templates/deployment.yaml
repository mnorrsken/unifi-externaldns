{{- if not .Values.unifi.apiUrl -}}
{{- fail "unifi.apiUrl is required" -}}
{{- end -}}
{{- if not .Values.domainSuffix -}}
{{- fail "domainSuffix is required" -}}
{{- end -}}
{{- if not .Values.unifi.existingSecret.name -}}
{{- fail "unifi.existingSecret.name is required — create a Secret with the Unifi API key and set unifi.existingSecret.name to its name" -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unifi-externaldns.fullname" . }}
  labels:
    {{- include "unifi-externaldns.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "unifi-externaldns.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "unifi-externaldns.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "unifi-externaldns.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: unifi-externaldns
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --api-url={{ .Values.unifi.apiUrl }}
            - --site-id={{ .Values.unifi.siteId }}
            - --domain-suffix={{ .Values.domainSuffix }}
            - --poll-interval={{ .Values.pollInterval }}
            - --namespace={{ include "unifi-externaldns.targetNamespace" . }}
            {{- if .Values.unifi.insecure }}
            - --insecure
            {{- end }}
          env:
            - name: UNIFI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.unifi.existingSecret.name }}
                  key: {{ .Values.unifi.existingSecret.key }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
